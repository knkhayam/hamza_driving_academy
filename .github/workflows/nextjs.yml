name: Deploy Next.js site to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Build with Next.js
        run: npm run build
        env:
          # Project Pages URL is /<repo> — must match withBasePath() in the app
          NEXT_PUBLIC_BASE_PATH: /hamza_driving_academy
          NEXT_PUBLIC_SITE_URL: https://knkhayam.github.io/hamza_driving_academy
          NEXT_PUBLIC_SITE_NAME: Hamza Driving Academy
          NEXT_PUBLIC_TAGLINE: Learn Today, Drive Tomorrow, Succeed Forever
          NEXT_PUBLIC_CTA_TEXT: Call now to book your lessons
          NEXT_PUBLIC_PHONE: "07438431446"
          NEXT_PUBLIC_WHATSAPP: "447438431446"
          NEXT_PUBLIC_EMAIL: ""
          NEXT_PUBLIC_ADDRESS: 109 Littleover Ln, Littleover, Derby DE23 6JJ
          NEXT_PUBLIC_CITY: Derby
          NEXT_PUBLIC_MAPS_URL: https://www.google.com/maps/place/Hamza+Driving+Academy/@52.9004932,-1.5001285,17z
          NEXT_PUBLIC_INSTRUCTOR_NAME: Hamza
          NEXT_PUBLIC_EXPERIENCE_YEARS: "5"
          NEXT_PUBLIC_OPENING_HOURS: 6am to 9pm
          NEXT_PUBLIC_AREAS: Derby,Littleover,Mickleover,Normanton,Sunny Hill,Allenton,Sinfin,Osmaston,Chellaston,Alvaston
          NEXT_PUBLIC_SHOW_REVIEWS: "true"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
